<!DOCTYPE html>
<html>

<head>
    <title>NeuroTinder</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="header">
        <a href="/home" style="color:unset;text-decoration:unset;flex:1;font-size:xx-large;">NeuroTinder</a>
        <img class="smallpfp" style="height:50px;" src="/static/img/pfp/{{pfp}}">
        <div style="text-align: center; margin-right: 5px;">
            <p id="welcome">Привет, {{username}}</p>
            <div style="display:flex; justify-content: space-around; align-items: center;">
                <img id="bell" style="display:{% if hasnew %}block{% else %}none{%endif%}" class=" bell"
                    src='/static/img/bell.png'>
                <a href="/chats">Чаты</a>
                <button onclick="logout()">Выход</button>
            </div>
        </div>
    </div>

    <div class="bots">
        {% for bot in bots %}
        <div class="bot">
            <h2>{{bot.name}}</h2>
            <img class="bigpfp" src="/static/img/pfp/{{bot.pfp}}">
            <p>Возраст: {{bot.age}}</p>
            <p class="line-clamp" title="{{bot.bio}}"><i>{{bot.bio}}</i></p>
            <a href="/chat/{{bot.name}}">Написать</a>
        </div>
        {% endfor %}

        <div class="bot" style="height:100px;width:100px;">
            {% if has_more %}
            <a href="/home?page={{page+1}}">Дальше</a>
            {%else%}
            <a href="/home?page=1">Дальше</a>
            {% endif %}
        </div>
    </div>

    <script src="/static/js/tools.js"></script>
    <script>
        function logout() {
            del_cookie("username")
            del_cookie("session")
            window.location.href = "/";
        }
        wsconnect(j => {
            msgnotify(j)
            $('bell').style.display = "block"
        })
    </script>
</body>

</html>
